# ===================================================================================
# CONFIGURATION DE PRODUCTION DU GATEWAY SERVICE
# ===================================================================================
# Cette configuration est optimisée pour l'environnement de production.
# Elle privilégie la sécurité, les performances et la stabilité.
#
# OPTIMISATIONS PRODUCTION:
# - Sécurité renforcée (HTTPS, JWT, CORS restrictif)
# - Rate limiting strict pour éviter les abus
# - Timeouts optimisés pour les performances
# - Logs structurés pour le monitoring
# - Métriques et alerting configurés
# - Circuit breakers pour la résilience
# - Configuration Redis cluster
# - SSL/TLS activé
#
# RELATIONS PRODUCTION:
# - Load balancer externe (Nginx/HAProxy)
# - Services déployés sur Kubernetes/Docker
# - Base de données PostgreSQL
# - Redis Cluster pour la haute disponibilité
# - Monitoring avec Prometheus/Grafana
# - Logs centralisés (ELK Stack)
# - Eureka Server en cluster
# ===================================================================================

# Configuration serveur production
server:
  port: ${SERVER_PORT:8080}
  
  # Configuration SSL/TLS obligatoire en production
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE_PATH:/etc/ssl/gateway-keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: gateway-service
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3
  
  # Configuration des performances
  tomcat:
    max-connections: ${MAX_CONNECTIONS:8192}
    accept-count: ${ACCEPT_COUNT:100}
    max-threads: ${MAX_THREADS:200}
    min-spare-threads: ${MIN_THREADS:10}
  
  # Sécurité des en-têtes
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# Configuration Spring production
spring:
  application:
    name: gateway-service
  
  profiles:
    active: production
  
  # Configuration Redis Cluster pour production
  redis:
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:redis-node1:6379,redis-node2:6379,redis-node3:6379}
      max-redirects: 3
    password: ${REDIS_PASSWORD}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 10
        max-wait: 2000ms
      cluster:
        refresh:
          adaptive: true
          period: 30s
  
  # Base de données PostgreSQL pour les métadonnées Gateway
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db-cluster:5432/gateway_prod}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        jdbc:
          batch_versioned_data: true
  
  # Configuration Gateway production
  cloud:
    gateway:
      # Routes de production avec sécurité renforcée
      routes:
        # Service utilisateur avec authentification stricte
        - id: user-service-prod
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter
            - RateLimitingFilter=20,60
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,POST,PUT,DELETE
        
        # Service formation avec cache
        - id: formation-service-prod
          uri: lb://formation-service
          predicates:
            - Path=/api/formations/**
          filters:
            - AuthenticationFilter
            - RateLimitingFilter=30,60
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 15
                redis-rate-limiter.burstCapacity: 30
        
        # Service étudiant
        - id: student-service-prod
          uri: lb://student-service
          predicates:
            - Path=/api/students/**
          filters:
            - AuthenticationFilter
            - RateLimitingFilter=25,60
            - StripPrefix=1
        
        # Service paiement avec sécurité maximale
        - id: payment-service-prod
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter
            - RequestValidationFilter
            - RateLimitingFilter=5,60
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
        
        # Service notification
        - id: notification-service-prod
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - AuthenticationFilter
            - RateLimitingFilter=50,60
            - StripPrefix=1
        
        # Authentification avec limite stricte
        - id: auth-service-prod
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 8
      
      # Configuration réseau production
      httpclient:
        connect-timeout: 3000
        response-timeout: 15000
        pool:
          max-connections: 200
          max-idle-time: 20s
          max-life-time: 60s
        ssl:
          use-insecure-trust-manager: false
          trusted-x509-certificates: ${TRUSTED_CERTIFICATES_PATH:/etc/ssl/trusted-certs}
      
      # Configuration globale des filtres
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Gateway-Version
            value: "v1.0"
        - name: AddResponseHeader
          args:
            name: X-Response-Time
            value: "#{T(System).currentTimeMillis()}"
        - name: SecureHeaders

# Configuration Eureka production
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVERS:http://eureka1:8761/eureka/,http://eureka2:8761/eureka/,http://eureka3:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
    eureka-server-connect-timeout-seconds: 10
    eureka-server-read-timeout-seconds: 10
  instance:
    prefer-ip-address: false
    hostname: ${HOSTNAME:gateway-service}
    instance-id: ${spring.application.name}:${HOSTNAME:gateway-service}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      version: ${app.version:1.0.0}
      environment: production

# Configuration JWT production avec rotation des clés
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000}  # 30 minutes
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}  # 24 heures
  issuer: ${JWT_ISSUER:https://api.javacraftacademy.com}
  audience: ${JWT_AUDIENCE:javacraftacademy-api}
  
  # Configuration de rotation des clés
  key-rotation:
    enabled: true
    rotation-interval: 86400000  # 24 heures
    
  # Configuration RSA pour la signature
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY}
    public-key: ${JWT_RSA_PUBLIC_KEY}

# Rate limiting strict pour production
rate-limit:
  default:
    requests-per-minute: 60
    burst-capacity: 100
  auth:
    requests-per-minute: 5
    burst-capacity: 10
  api:
    requests-per-minute: 100
    burst-capacity: 150
  payment:
    requests-per-minute: 5
    burst-capacity: 8

# Configuration CORS restrictive production
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://www.javacraftacademy.com,https://app.javacraftacademy.com}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - Accept
    - X-CSRF-Token
  exposed-headers:
    - X-Total-Count
    - X-Rate-Limit-Remaining
  allow-credentials: true
  max-age: 1800

# Monitoring et métriques production
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMIN
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  
  # Configuration des métriques
  metrics:
    export:
      prometheus:
        enabled: true
        step: 60s
      datadog:
        enabled: ${DATADOG_ENABLED:false}
        api-key: ${DATADOG_API_KEY:}
        application-key: ${DATADOG_APP_KEY:}
    distribution:
      percentiles:
        http.server.requests: 0.5,0.75,0.95,0.99
        gateway.requests: 0.5,0.75,0.95,0.99
    tags:
      application: ${spring.application.name}
      environment: production
      version: ${app.version:1.0.0}
  
  # Configuration health checks
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true

# Configuration logs production
logging:
  level:
    root: WARN
    com.javacraftacademy.gateway: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.security: WARN
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE_PATH:/var/log/gateway-service/gateway.log}
    max-size: 100MB
    max-history: 30
    total-size-cap: 1GB
  
  # Configuration logback pour logs structurés
  config: classpath:logback-spring.xml

# Configuration Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      user-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      formation-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      payment-service:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 30
  
  # Configuration Retry
  retry:
    instances:
      user-service:
        maxAttempts: 3
        waitDuration: 1000ms
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
      formation-service:
        maxAttempts: 3
        waitDuration: 1000ms
      payment-service:
        maxAttempts: 2
        waitDuration: 2000ms

# Configuration de sécurité production
security:
  headers:
    frame-options: DENY
    content-type-options: nosniff
    xss-protection: "1; mode=block"
    referrer-policy: strict-origin-when-cross-origin
    permissions-policy: "geolocation=(), microphone=(), camera=()"
  
  # Configuration CSRF
  csrf:
    enabled: true
    token-repository: cookie
    cookie:
      secure: true
      http-only: true
      same-site: strict

# Configuration cache Redis
cache:
  redis:
    time-to-live: 600  # 10 minutes
    cache-null-values: false
    use-key-prefix: true
    key-prefix: "gateway:cache:"
  
  # Configuration des caches spécifiques
  names:
    - user-cache
    - formation-cache
    - auth-cache
  
  # TTL spécifique par cache
  ttl:
    user-cache: 300     # 5 minutes
    formation-cache: 1800  # 30 minutes
    auth-cache: 900     # 15 minutes

# Configuration des timeouts
timeouts:
  connection: 3000ms
  read: 15000ms
  write: 15000ms
  
  # Timeouts spécifiques par service
  services:
    user-service:
      connection: 2000ms
      read: 10000ms
    formation-service:
      connection: 2000ms
      read: 12000ms
    payment-service:
      connection: 5000ms
      read: 30000ms
    notification-service:
      connection: 2000ms
      read: 8000ms

# Configuration de l'application
app:
  version: ${APP_VERSION:1.0.0}
  name: ${APP_NAME:JavaCraft Academy Gateway}
  description: Gateway service for JavaCraft Academy platform
  contact:
    email: admin@javacraftacademy.com
    url: https://www.javacraftacademy.com
  
  # Configuration des features
  features:
    rate-limiting: true
    circuit-breaker: true
    request-logging: true
    metrics: true
    caching: true
    ssl-required: true

# Configuration des alertes
alerting:
  enabled: ${ALERTING_ENABLED:true}
  webhooks:
    slack: ${SLACK_WEBHOOK_URL:}
    teams: ${TEAMS_WEBHOOK_URL:}
  
  # Seuils d'alertes
  thresholds:
    error-rate: 5.0  # Pourcentage
    response-time: 2000  # Millisecondes
    memory-usage: 80  # Pourcentage
    cpu-usage: 70   # Pourcentage

# Configuration des variables d'environnement requises
required-env-vars:
  - JWT_SECRET
  - JWT_RSA_PRIVATE_KEY
  - JWT_RSA_PUBLIC_KEY
  - REDIS_PASSWORD
  - DATABASE_USERNAME
  - DATABASE_PASSWORD
  - SSL_KEYSTORE_PASSWORD