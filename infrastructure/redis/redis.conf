# Configuration Redis pour JavaCraft Academy - Développement
# Fichier: infrastructure/redis/redis.conf

# Réseau
bind 0.0.0.0
port 6379
protected-mode no

# Mémoire
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistance
save 900 1
save 300 10
save 60 10000

# Logs
loglevel notice
logfile ""

# Base de données
databases 16

# Sécurité (développement)
# requirepass dev_password_redis

# Performance
tcp-keepalive 300
timeout 0

# Clients
maxclients 10000

# Modules et extensions
# loadmodule /path/to/my_module.so

# Configuration spécifique pour les sessions
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Configuration pour les caches
list-max-ziplist-size -2
list-compress-depth 0

# Notifications d'événements clés
notify-keyspace-events Ex

# Configuration avancée
tcp-backlog 511
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./

# Replication (pour plus tard)
# replicaof <masterip> <masterport>
# replica-read-only yes

# Sécurité avancée
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "CONFIG_b4c3d2a1f6e5"

# Monitoring
latency-monitor-threshold 100